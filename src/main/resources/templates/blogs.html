<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>spring</title>
    
</head>


<body>
    <div th:replace="~{fragments/header :: layout-header}"></div>
    <div class="page_title"><h2>猫事典サイト</h2></div>
    <div class="big-grid">
        <div class="big-card" th:each="blog : ${blogs}">
            <a class="card-title" th:href="@{/blogs/{id}(id=${blog.id})}" th:text="${blog.title}">タイトル</a>
            <p class="card-body" th:text="${blog.body}">本文</p>
        </div>
    </div>
</body>
</html>
