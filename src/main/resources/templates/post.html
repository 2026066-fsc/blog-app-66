<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>post</title>
</head>
<body>
    <div th:replace="~{fragments/header :: layout-header}"></div>

    <!-- 投稿ページ -->

    <div class="page_title"><h2>投稿ページ</h2></div>
    <div class="post">
        <form th:action="@{/post}" method="post">
            <input type="text" class="post-title-input" name="title" placeholder="タイトルを入力してください">
            <br>
            <textarea class="post-body-input" name="body" placeholder="本文を入力してください"></textarea>
            <br>
            <button type="submit">投稿</button>
        </form>
    </div>
    <br>
    <a href="/blogs">一覧に戻る</a>

        <!-- 参考
        <label>
            <input type="radio" name= "hand"value="0" checked>グー
        </label><br> -->
    
</body>
</html>
